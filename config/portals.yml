# Portal Scanner Configuration — Óscar Martínez Zamora
# CentraleSupélec / UPV · Operations Research & Risk Analytics
# Target: Stage or Alternance · Sept 2026 · Paris area
# Focus: Operations Consulting · Supply Chain Optimisation · OR Engineering
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.totalenergies.com   ⚠️ https://totalenergies.wd3.myworkdayjobs.com (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to config/portals.yml
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Location filter --
# Uncomment to restrict to Paris area + France only.
#
# location_filter:
#   allow:
#     - "Paris"
#     - "Île-de-France"
#     - "Saclay"
#     - "France"
#     - "Remote"
#   block:
#     - "London"
#     - "Germany"
#     - "Singapore"
#     - "USA"
#     - "India"
#     - "Morocco"      # unless you'd consider Casablanca for alternance

# -- Title filter --
# Tailored for Óscar: operations consulting, supply chain, OR, industrial engineering.
# Stage and alternance are WANTED — not filtered out.

title_filter:
  positive:
    # -- Core target roles (EN) --
    - "Operations"
    - "Supply Chain"
    - "Logistics"
    - "Operations Research"
    - "Optimization"
    - "Optimisation"
    - "Industrial Engineering"
    - "Process Improvement"
    - "Operational Excellence"
    - "Lean"
    - "Continuous Improvement"
    # -- Core target roles (FR) --
    - "Consultant"
    - "Consultante"
    - "Stage"
    - "Stagiaire"
    - "Alternance"
    - "Ingénieur"
    - "Supply Chain"
    - "Logistique"
    - "Flux"
    - "Gestion de la production"
    - "Recherche Opérationnelle"
    - "Amélioration continue"
    - "Excellence opérationnelle"
    - "Planification"
    - "Ordonnancement"
    - "Simulation"
    # -- Strategy & consulting --
    - "Strategy"
    - "Stratégie"
    - "Transformation"
    - "Analyst"
    - "Analyste"
    - "Business Analyst"
    - "Management Consultant"
    # -- Data & quantitative (aligned with Gurobi/OR skills) --
    - "Data Analyst"
    - "Data Scientist"
    - "Quantitative"
    - "Modelling"
    - "Modélisation"
    - "Decision Science"
    - "Planning"
    # -- Project & industrial --
    - "Project"
    - "Projet"
    - "Industrial"
    - "Industriel"
    - "Procurement"
    - "Achat"
    - "Demand Planning"
    - "Forecasting"
    - "Inventory"
    - "Entreposage"
    - "Distribution"
  negative:
    # Keep role-type negatives only — NOT stage/alternance/junior
    # (Óscar IS targeting entry-level/trainee positions)
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "COBOL"
    - "Mainframe"
    - "DevOps"          # not his target
    - "Cybersecurity"   # not his target
    - "Marketing"       # exclude pure marketing roles
    - "Commercial"      # exclude pure sales roles
    - "Comptable"       # exclude pure accounting
    - "Juridique"       # exclude legal
    - "RH"              # exclude pure HR
  seniority_boost:
    # These prefixes add relevance — internship/alternance titles often don't include them,
    # but senior postings at target firms are worth tracking too (future reference).
    - "Senior"
    - "Lead"
    - "Manager"
    - "Expert"
    - "Principal"
    - "Head"
    - "Directeur"

# -- Search queries --
# Targeted at French grandes écoles job boards and consulting/industry career portals.
# All queries explicitly target stage or alternance from Sept 2026.

search_queries:

  # -- French grandes écoles job boards --
  - name: Forum des Grandes Écoles — Stage opérations/supply chain
    query: 'site:jobteaser.com "supply chain" OR "opérations" OR "logistique" OR "consultant" stage "CentraleSupélec" OR "grande école" 2026'
    enabled: true

  - name: JobTeaser — Stage conseil opérations Paris
    query: 'site:jobteaser.com stage "consultant" OR "supply chain" OR "optimisation" Paris "septembre 2026" OR "2026-2027"'
    enabled: true

  - name: APEC — Ingénieur supply chain / consultant opérations
    query: 'site:apec.fr "supply chain" OR "logistique" OR "recherche opérationnelle" "stage" OR "alternance" Paris 2026'
    enabled: true

  # -- Operations & consulting specific --
  - name: Welcome to the Jungle — Stage conseil stratégie/opérations
    query: 'site:welcometothejungle.com stage "consultant" OR "opérations" OR "supply chain" OR "stratégie" Paris 2026'
    enabled: true

  - name: Welcome to the Jungle — Alternance ingénieur opérations
    query: 'site:welcometothejungle.com alternance "ingénieur" OR "supply chain" OR "logistique" OR "planification" Paris'
    enabled: true

  - name: LinkedIn — Stage/alternance operations consulting Paris
    query: 'site:linkedin.com/jobs "stage" OR "alternance" "consultant" OR "supply chain" OR "operations" Paris France "septembre 2026"'
    enabled: true

  # -- Consulting-specific boards --
  - name: Consulting.fr — Stage grandes cabinets
    query: 'site:consulting.fr stage "supply chain" OR "opérations" OR "stratégie" Paris 2026'
    enabled: true

  - name: Greenhouse — Stage consulting France
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io stage OR internship "supply chain" OR "operations" OR "consultant" France OR Paris 2026'
    enabled: true

  - name: Lever — Stage opérations/supply chain Paris
    query: 'site:jobs.lever.co stage OR internship "supply chain" OR "operations" OR "logistics" Paris France'
    enabled: true

  # -- Industry-specific --
  - name: Indeed France — Stage/alternance ingénieur supply chain
    query: 'site:indeed.fr "ingénieur supply chain" OR "consultant opérations" OR "analyste logistique" stage OR alternance Paris Île-de-France 2026'
    enabled: true

  - name: Cadremploi — Alternance/stage grandes entreprises
    query: 'site:cadremploi.fr stage OR alternance "supply chain" OR "logistique" OR "consultant" OR "opérations" Paris Île-de-France'
    enabled: true

  - name: Hellowork — Stage OR ingénieur opérations Paris
    query: 'site:hellowork.com stage alternance "supply chain" OR "consultant" OR "opérations" OR "logistique" Paris 2026'
    enabled: true

