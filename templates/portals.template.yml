# =============================================================
# Portal Scanner Configuration — TEMPLATE
# =============================================================
# Replace every <PLACEHOLDER> with your own values.
# Read the comments carefully — they explain every field.
#
# Strategy (3 levels, tried in order):
#   1. Playwright     → fetches careers_url directly (real-time, most reliable)
#   2. Greenhouse API → structured JSON via api: field (fast, Greenhouse-only)
#   3. WebSearch      → site:-filtered query (broad, may return stale results)
#
# IMPORTANT — careers_url rules:
#   ✅ Prefer the branded company page:  https://careers.<company>.com
#   ⚠️ Use ATS-hosted URL only as fallback: https://job-boards.greenhouse.io/<slug>
#   Exception: ATS URL is fine when no branded careers page exists.
#   Using a raw ATS URL when a branded page exists can cause false 410 errors.
#
# HOW TO USE THIS TEMPLATE:
#   1. Fill in your name and target role in the header block below.
#   2. Edit title_filter.positive with YOUR target role keywords.
#   3. Edit title_filter.negative to exclude roles you don't want.
#   4. Replace search_queries with boards and terms relevant to your market.
#   5. Add companies to tracked_companies following the examples.
#   6. Set enabled: false on companies you want to pause (keeps config intact).
# =============================================================


# =============================================================
# CANDIDATE METADATA  (informational — used in report headers)
# =============================================================

candidate:
  name:         "<FULL NAME>"                  # e.g. "Jane Smith"
  school:       "<SCHOOL / UNIVERSITY>"        # e.g. "CentraleSupélec"
  programme:    "<DEGREE / SPECIALISATION>"    # e.g. "MSc Operations Research"
  target_role:  "<TARGET ROLE(S)>"             # e.g. "Supply Chain Consulting Intern"
  start_date:   "<AVAILABILITY DATE>"          # e.g. "September 2026"
  location:     "<PREFERRED LOCATION>"         # e.g. "Paris, France"
  contract:     "<CONTRACT TYPE>"              # e.g. "Stage" | "Alternance" | "Full-time"


# =============================================================
# LOCATION FILTER  (optional — comment out to disable)
# =============================================================
# Applied AFTER title filter, BEFORE deduplication.
# Semantics:
#   · Empty location on a job → passes (don't penalise missing data)
#   · Any `block` keyword present → reject (takes precedence over allow)
#   · `allow` empty → passes (already cleared block check)
#   · `allow` non-empty → must match at least one keyword
# All matches are case-insensitive substring.

# location_filter:
#   allow:
#     - "<CITY OR REGION>"          # e.g. "Paris"
#     - "<COUNTRY>"                 # e.g. "France"
#     - "Remote"
#   block:
#     - "<LOCATION TO EXCLUDE>"     # e.g. "London"
#     - "<LOCATION TO EXCLUDE>"     # e.g. "India"


# =============================================================
# TITLE FILTER
# =============================================================
# Controls which job titles are considered relevant.
# Rule: at least 1 positive must match AND 0 negatives must match.
# All matches are case-insensitive substring.

title_filter:

  positive:
    # -- <ROLE CATEGORY 1> --          # e.g. "Core target roles"
    - "<KEYWORD>"                      # e.g. "Supply Chain"
    - "<KEYWORD>"                      # e.g. "Operations"
    - "<KEYWORD>"                      # e.g. "Logistics"

    # -- <ROLE CATEGORY 2> --          # e.g. "Consulting / Strategy"
    - "<KEYWORD>"                      # e.g. "Consultant"
    - "<KEYWORD>"                      # e.g. "Strategy"
    - "<KEYWORD>"                      # e.g. "Analyst"

    # -- <ROLE CATEGORY 3> --          # e.g. "Contract types you want"
    - "<KEYWORD>"                      # e.g. "Stage"
    - "<KEYWORD>"                      # e.g. "Alternance"
    - "<KEYWORD>"                      # e.g. "Internship"

    # Add as many categories and keywords as needed.

  negative:
    # Titles containing ANY of these are excluded.
    - "<KEYWORD TO EXCLUDE>"           # e.g. "iOS"
    - "<KEYWORD TO EXCLUDE>"           # e.g. "Firmware"
    - "<KEYWORD TO EXCLUDE>"           # e.g. "Marketing"
    # Add keywords for roles you never want to see.

  seniority_boost:
    # Optional. These prefixes don't filter — they raise the relevance score.
    - "<SENIORITY PREFIX>"             # e.g. "Senior"
    - "<SENIORITY PREFIX>"             # e.g. "Lead"
    - "<SENIORITY PREFIX>"             # e.g. "Manager"


# =============================================================
# SEARCH QUERIES
# =============================================================
# Each entry triggers a WebSearch scan.
# Tips:
#   · Use site: to target a specific job board.
#   · Combine OR for multiple keywords in a single query.
#   · Include your city / country and contract type for precision.
#   · Keep queries specific — broad queries return noisy results.

search_queries:

  # -- <BOARD OR SOURCE NAME> --
  - name: "<DESCRIPTIVE QUERY NAME>"           # e.g. "LinkedIn — Supply Chain Intern Paris"
    query: '<YOUR SEARCH QUERY>'               # e.g. 'site:linkedin.com/jobs "supply chain" "stage" Paris 2026'
    enabled: true

  - name: "<DESCRIPTIVE QUERY NAME>"
    query: '<YOUR SEARCH QUERY>'
    enabled: true

  # Add more entries following the same pattern.
  # Set enabled: false to pause a query without deleting it.


# =============================================================
# TRACKED COMPANIES
# =============================================================
# Companies whose career pages are scanned directly.
#
# REQUIRED fields:
#   name          Company display name
#   careers_url   Branded careers page URL (see rules at top)
#   enabled       true | false
#
# OPTIONAL fields:
#   api           Greenhouse boards API URL (speeds up scanning for GH companies)
#   scan_method   playwright (default) | websearch | greenhouse_api
#   scan_query    Custom WebSearch query used when scan_method: websearch
#   notes         Free-text notes: sector, location, fit rating, personal connections
#
# SCAN METHOD GUIDE:
#   · Most companies     → omit scan_method (playwright is the default)
#   · Greenhouse ATS     → add api: field; optionally set scan_method: greenhouse_api
#   · No structured ATS  → set scan_method: websearch and provide scan_query
#
# CAREERS URL PATTERNS BY ATS:
#   Greenhouse  →  https://job-boards.greenhouse.io/<company-slug>
#   Lever       →  https://jobs.lever.co/<company-slug>
#   Ashby       →  https://jobs.ashbyhq.com/<company-slug>
#   Workday     →  https://<company>.wd1.myworkdayjobs.com/careers
#   SmartRecruiters → https://careers.smartrecruiters.com/<Company>
#
# GREENHOUSE API PATTERN:
#   https://boards-api.greenhouse.io/v1/boards/<company-slug>/jobs

tracked_companies:

  # -----------------------------------------------------------
  # SECTION: <SECTOR OR CATEGORY NAME>   e.g. "OPERATIONS CONSULTING"
  # -----------------------------------------------------------

  # --- Minimal entry (playwright, no custom query needed) ---
  - name: "<COMPANY NAME>"
    careers_url: https://<careers-url>
    notes: "<Location>. <One-line description>. <Fit rating or personal connection>."
    enabled: true

  # --- Greenhouse company (faster scanning via API) ---
  - name: "<COMPANY NAME>"
    careers_url: https://job-boards.greenhouse.io/<slug>
    api: https://boards-api.greenhouse.io/v1/boards/<slug>/jobs
    notes: "<Location>. <One-line description>."
    enabled: true

  # --- Company requiring WebSearch (no direct ATS or dynamic page) ---
  - name: "<COMPANY NAME>"
    careers_url: https://<careers-url>
    scan_method: websearch
    scan_query: 'site:<careers-domain> "<ROLE KEYWORD>" OR "<ROLE KEYWORD>" "<CONTRACT TYPE>" <YEAR>'
    notes: "<Location>. <One-line description>."
    enabled: true

  # --- Paused entry (config kept, scanning disabled) ---
  - name: "<COMPANY NAME>"
    careers_url: https://<careers-url>
    scan_method: websearch
    scan_query: '<YOUR QUERY>'
    notes: "<Reason for disabling, e.g. wrong location / low fit>."
    enabled: false

  # -----------------------------------------------------------
  # SECTION: <NEXT SECTOR OR CATEGORY>
  # -----------------------------------------------------------

  - name: "<COMPANY NAME>"
    careers_url: https://<careers-url>
    notes: "<Notes>."
    enabled: true

  # Add as many sections and companies as needed.
